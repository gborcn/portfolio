<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Blackjack Game</title>
  <link rel="stylesheet" href="style.css">

  <style>
    /* EXIT BUTTON */
    .exit-btn {
      display: inline-block;
      margin: 10px;
      font-size: 14px;
      padding: 6px 20px;
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 25px;
      color: rgba(255,255,255,0.6);
      text-decoration: none;
      background: transparent;
      transition: 0.3s;
    }

    .exit-btn:hover {
      background: rgba(255,255,255,0.1);
      color: #fff;
      border-color: #fff;
    }
  </style>
</head>
<body>

  <!-- EXIT BUTTON -->
  <a href="index.html" class="exit-btn">✖ Exit</a>

  <h1>Blackjack</h1>

  <div class="container">
    <p id="message">Want to play a round?</p>

    <!-- DEALER (TOP) -->
    <h3>Dealer</h3>
    <p>Cards: <span id="dealer-cards"></span></p>
    <p>Sum: <span id="dealer-sum"></span></p>

    <!-- PLAYER (BOTTOM) -->
    <h3>Kuya ROB</h3>
    <p>Cards: <span id="cards"></span></p>
    <p>Sum: <span id="sum"></span></p>

    <p id="dealer-log"></p>

    <!-- BUTTONS -->
    <button id="start-btn" onclick="startGame()">Start Game</button>
    <button onclick="newCard()">Hit</button>
    <button onclick="stand()">Stand</button>
    <button onclick="playAgain()">Play Again</button>

    <!-- SCORE -->
    <p>Wins: <span id="wins">0</span></p>
  </div>

  <script src="functions.js"></script>
</body>
</html>
